<!DOCTYPE html>
<!--
  Papa & Pony's — 404-pagina (GitHub Pages serveert deze automatisch
  voor onbekende paden). Vriendelijk terugverwijzen naar de homepage.
-->
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina niet gevonden | Papa &amp; Pony's</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1e2430;--ink-soft:#4a5264;--paper:#fffdf9;--paper-tint:#fdf6ec;--accent:#e8a020;--accent-deep:#c9861a;--rose-soft:#fbe9ed;--line:#e9e2d6;--font-display:'Outfit',sans-serif;--font-mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-display);background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;display:grid;place-items:center;padding:24px}
.kaart{text-align:center;max-width:520px}
.pony{font-size:4rem;display:inline-block;animation:zweef 4s ease-in-out infinite}
@keyframes zweef{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(5deg)}}
.code{font-family:var(--font-mono);font-size:.8rem;color:var(--accent-deep);background:var(--paper-tint);border:1px solid var(--line);padding:5px 14px;border-radius:999px;display:inline-block;margin:18px 0 12px}
h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
p{color:var(--ink-soft);margin-bottom:26px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-weight:600;padding:13px 26px;border-radius:999px;text-decoration:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);background:var(--accent-deep);box-shadow:0 8px 20px rgba(232,160,32,.35)}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important}}
</style>
</head>
<body>
<div class="kaart">
  <span class="pony">🐴</span>
  <div><span class="code">404 — niet gevonden</span></div>
  <h1>Dit paadje loopt dood</h1>
  <p>Deze pagina bestaat niet (meer). Geen zorgen — net als bij een scheve vlecht beginnen we gewoon opnieuw.</p>
  <a class="btn" href="/papas-en-ponys/">Naar de homepage →</a>
</div>
</body>
</html>
